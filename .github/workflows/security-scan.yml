name: Security Scanning

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight

jobs:
  security-scanning:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --only=production
      
    - name: Run npm audit
      run: npm audit --audit-level=moderate
      
    - name: Run Snyk Security Scan
      uses: snyk/actions/node@master
      continue-on-error: true  # Continue even if vulnerabilities found
      with:
        args: --severity-threshold=high
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        
    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v3
      with:
        languages: javascript, typescript
        
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      
    - name: Run dependency-check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'vender-app'
        path: '.'
        format: 'HTML'
        out: 'reports'
        
    - name: Upload dependency check report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-check-report
        path: reports/
        
  secret-scanning:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Detect secrets in codebase
      uses: trufflesecurity/trufflehog@main
      with:
        extra_args: --json --regex --entropy=False
        
    - name: GitLeaks Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
  sast-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Semgrep SAST
      uses: returntocorp/semgrep-action@v1
      with:
        config: p/security-audit
        
    - name: Run Bandit Security Scan (Python if exists)
      if: contains(github.event.head_commit.modified, '.py') || contains(github.event.head_commit.added, '.py')
      uses: tj-actions/bandit-scan@v4